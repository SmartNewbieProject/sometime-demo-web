name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.some-in-univ.com
          NEXT_PUBLIC_WS_URL: https://api.some-in-univ.com
          NEXT_PUBLIC_COUNTRY: kr
          NEXT_PUBLIC_DEEP_LINK_URL: sometime://session?id=
